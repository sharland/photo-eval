{% extends "base.html" %}
{% block title %}Evaluate — Photo Eval{% endblock %}

{% block content %}
<h1>Evaluate photos</h1>

<div class="card" style="max-width:560px; margin-bottom:1.5rem;">
  <h2 style="margin-bottom:1rem;">Start a session</h2>
  <form action="/evaluate/batch" method="get"
        style="display:grid; gap:0.75rem;">
    <div style="display:flex; gap:0.75rem; align-items:center;">
      <label style="color:var(--muted); font-size:0.9rem; width:80px;">Type</label>
      <select name="eval_type" style="flex:1;">
        {% for et in eval_types %}
        <option value="{{ et }}">{{ et | capitalize }}</option>
        {% endfor %}
      </select>
    </div>
    <div style="display:flex; gap:0.75rem; align-items:center;">
      <label style="color:var(--muted); font-size:0.9rem; width:80px;">Folder</label>
      <select name="folder" style="flex:1;">
        <option value="">— all indexed photos —</option>
        {% for root in roots %}
        <option value="{{ root }}">{{ root }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-primary" style="justify-self:start;">
      Load next batch →
    </button>
  </form>
</div>

<p style="color:var(--muted); font-size:0.85rem;">
  Evaluation resumes where you left off. Each batch is 12 photos.
  Keyboard shortcuts: <code>1–9/0</code> select photo, <code>Y/E/N</code> set verdict, <code>Enter</code> submit.
</p>
{% endblock %}
