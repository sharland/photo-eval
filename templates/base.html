<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Photo Eval{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --text: #e0e0e0;
      --muted: #888;
      --accent: #4a9eff;
      --yes: #3a8a3a;
      --yes-hover: #4aaa4a;
      --edge: #8a6a1a;
      --edge-hover: #aa8a2a;
      --no: #8a2a2a;
      --no-hover: #aa3a3a;
      --yes-active: #5aba5a;
      --edge-active: #caaa4a;
      --no-active: #ca4a4a;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    nav .brand {
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      font-size: 1rem;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
    }

    nav a:hover, nav a.active { color: var(--text); }

    .warning-banner {
      background: #3a2a00;
      border-bottom: 1px solid #6a4a00;
      padding: 0.5rem 1.5rem;
      font-size: 0.85rem;
      color: #ffcc44;
    }

    main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }

    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1rem; }
    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75rem; color: var(--muted); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
    }

    .btn {
      display: inline-block;
      padding: 0.45rem 1rem;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
    .btn-primary:hover { background: #6ab8ff; border-color: #6ab8ff; color: #000; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }

    .stat-card .num { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-card .label { font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; }

    select, input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.6rem;
      border-radius: 5px;
      font-size: 0.9rem;
    }

    select:focus, input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <a href="/" class="brand">📷 Photo Eval</a>
    <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Dashboard</a>
    <a href="/scan" {% if request.url.path.startswith("/scan") %}class="active"{% endif %}>Scan</a>
    <a href="/evaluate" {% if request.url.path.startswith("/evaluate") %}class="active"{% endif %}>Evaluate</a>
    <a href="/report" {% if request.url.path.startswith("/report") %}class="active"{% endif %}>Report</a>
    <a href="/listings" {% if request.url.path.startswith("/listings") %}class="active"{% endif %}>Listings</a>
  </nav>

  {% if not exiftool_available %}
  <div class="warning-banner">
    ⚠ exiftool not found — NEF previews unavailable. Place <code>exiftool.exe</code> in <code>_app/</code> or add it to PATH. JPG and HEIC evaluation still works.
  </div>
  {% endif %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
